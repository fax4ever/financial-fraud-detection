name: Financial Fraud Detection Notebook Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-notebook:
    runs-on: arc-runners-org-nvidia-ai-bp-1-gpu
    env:
      NOTEBOOK_PATH: ./financial-fraud-usage-v2.ipynb
      PYTHON_VERSION: 3.12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            **/*.ipynb

      - name: Install Git LFS
        run: |
          echo "===================== Install Git LFS ====================="
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pip ipython ipykernel
          # Note: Kernel will be installed later from within conda environment

      - name: Pull Git LFS files
        run: |
          echo "===================== Pull LFS files ====================="
          git lfs pull

      - name: Install Dependencies and Enable Environmnet
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          echo "===================== List folders ====================="
          ls -la
          echo ""
          echo "===================== Installing Mamba ====================="
          # Install in current directory
          CONDA_INSTALL_PATH="${PWD}/conda_install"
          curl -L -O "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
          bash Miniforge3-$(uname)-$(uname -m).sh -b -p "${CONDA_INSTALL_PATH}"
          # Set MAMBA_ROOT_PREFIX before sourcing
          export MAMBA_ROOT_PREFIX="${CONDA_INSTALL_PATH}"
          # Source conda and mamba
          source "${CONDA_INSTALL_PATH}/etc/profile.d/conda.sh"
          source "${CONDA_INSTALL_PATH}/etc/profile.d/mamba.sh"
          # Verify installation
          echo "Verifying mamba installation..."
          mamba --version
          echo "Miniforge3 installed successfully at ${CONDA_INSTALL_PATH}"
          # Save to GITHUB_ENV for subsequent steps
          echo "CONDA_INSTALL_PATH=${CONDA_INSTALL_PATH}" >> $GITHUB_ENV
          echo "MAMBA_ROOT_PREFIX=${CONDA_INSTALL_PATH}" >> $GITHUB_ENV
          echo ""
          echo "===================== Setting up NVIDIA API Key ====================="
          export NVIDIA_API_KEY="${NVIDIA_API_KEY}"
          echo "export NVIDIA_API_KEY=${NVIDIA_API_KEY}" >> ~/.bashrc
          echo "NVIDIA_API_KEY is set"
          echo ""
          echo "===================== Creating Conda Environment ====================="
          # Create conda environment
          cat conda/notebook_env.yaml
          export G_SLICE=always-malloc
          mamba config set use_lockfiles False
          mamba env create -f conda/notebook_env.yaml -y
          conda activate fraud_blueprint_env
          echo "===================== Conda environment created successfully ====================="
          echo ""
          echo "===================== Installing Jupyter Kernel from Conda Environment ====================="
          # Install kernel from within the conda environment
          python -m ipykernel install --user --name fraud_blueprint_env --display-name "Python (fraud_blueprint_env)"
          # Verify the kernel can import cudf
          python -c "import cudf; print(f'Kernel Python can import cudf version: {cudf.__version__}')"
          echo "Jupyter kernel installed successfully"

      - name: Docker Login
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          echo "===================== Docker Login ====================="
          echo "${NVIDIA_API_KEY}" | docker login nvcr.io -u '$oauthtoken' --password-stdin
          docker version

      - name: Get System Info
        run: |
          echo "===================== System Info ====================="
          more /etc/os-release

      - name: Download Data File Using Docker
        run: |
          echo "===================== Downloading Data File ====================="

          # Run the docker container to download the file
          docker run --name data_downloader \
            nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image:latest \
            python3 utils/financial_fraud_detection_download_box_file.py

          # Create the destination directory on the host
          mkdir -p data/TabFormer/raw/

          # Copy the file from the container to the host
          docker cp data_downloader:/app/downloads/extracted/credit_card/transactions.tgz data/TabFormer/raw/

          # Remove the container
          docker rm data_downloader

          # Verify the file was copied
          echo "Verifying downloaded file:"
          ls -lh data/TabFormer/raw/transactions.tgz
          echo "Data file downloaded and copied successfully!"

      - name: Run Jupyter Notebook with Papermill
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          echo "===================== Running Notebook ====================="
          OUTPUT_NOTEBOOK="result.ipynb"

          # Source conda and activate environment
          source "${CONDA_INSTALL_PATH}/etc/profile.d/conda.sh"
          conda activate fraud_blueprint_env

          # Verify cudf is available in the activated environment
          python -c "import cudf; print(f'cudf version: {cudf.__version__}')"

          # List available kernels
          echo "Available Jupyter kernels:"
          jupyter kernelspec list

          cd notebooks
          echo "Executing notebook: $NOTEBOOK_PATH"
          papermill "$NOTEBOOK_PATH" "$OUTPUT_NOTEBOOK" --kernel fraud_blueprint_env --log-output --log-level DEBUG

      - name: Convert result to html format
        if: always()
        run: |
          cd notebooks
          # Fallback if variable is empty
          if [ -z "${CONDA_INSTALL_PATH}" ]; then
            export CONDA_INSTALL_PATH="${PWD}/conda_install"
          fi

          # Source conda and activate environment for nbconvert
          source "${CONDA_INSTALL_PATH}/etc/profile.d/conda.sh"
          conda activate fraud_blueprint_env

          OUTPUT_NOTEBOOK="result.ipynb"
          jupyter nbconvert --to html "$OUTPUT_NOTEBOOK"

      - name: Run Test Code
        if: always()
        env:
          TEST_DOCKER_PULL_KEY: ${{ secrets.TEST_DOCKER_PULL_KEY }}
        run: |
          cd notebooks
          # Check if the HTML files exist before running tests
          if [ ! -f "./result.html" ]; then
            echo "Warning: result.html not found"
          fi
          # Run the test and capture the exit code
          echo "$TEST_DOCKER_PULL_KEY" | docker login nvcr.io --username '$oauthtoken' --password-stdin
          docker run --rm \
            -v ./result.html:/app/input/Financial-Fraud-Detection_result.html \
            -v "$(pwd):/workspace" \
            nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image:latest \
            pytest -m financial_fraud_detection --disable-warnings --html=/workspace/financial-fraud-detection.html --self-contained-html

      - name: Upload the result notebook as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result notebook and pytest
          path: |
             notebooks/result.html
             notebooks/financial-fraud-detection.html
          retention-days: 30
  
      - name: Set result output
        id: set_result
        if: always()  
        run: |
          echo "RESULT=$(if [ ${{ job.status }} == 'success' ]; then echo 'PASS'; else echo 'FAIL'; fi)" >> $GITHUB_OUTPUT
   
      - name: Send mail
        uses: dawidd6/action-send-mail@6e71c855c9a091d80a519621b9fd3e8d252ca40c
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          
          # Email details
          subject: "QA Test Workflow Result for ${{ github.repository }}"
          to: Github-Action-Blueprint-QA@nvidia.com
          from: github-workflow-notification@gmail.com
          html_body: |
            <p>Hello,</p>
            
            <p>The workflow for repository: <strong>${{ github.repository }}</strong> has completed.<br>
            <strong>Result:</strong> ${{ steps.set_result.outputs.RESULT }}</p>
            
            <p>You can review the details on GitHub:<br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</a></p>
            
            <p>Thanks!</p>      
